<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>E-Koin UPZISNU Baleharjo</title>
<meta name="theme-color" content="#0f5132">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="https://www.gstatic.com/images/branding/product/1x/sheets_48dp.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; overflow: hidden; background: #0f5132; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; }

  #app-frame { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; display: block; }

  #loader {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #0f5132; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; color: #fff; z-index: 10;
    transition: opacity 0.3s ease;
  }
  #loader.hide { opacity: 0; pointer-events: none; }
  .coin-icon { font-size: 40px; }
  .spinner { width: 42px; height: 42px; border: 4px solid rgba(255,255,255,0.25); border-top-color: #c9a227; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader p { font-size: 14px; opacity: 0.85; }
</style>
</head>
<body>

  <div id="loader">
    <div class="coin-icon">🪙</div>
    <div class="spinner"></div>
    <p id="loaderText">Memuat E-Koin UPZISNU Baleharjo...</p>
  </div>

  <iframe id="app-frame" title="E-Koin UPZISNU Baleharjo" allow="clipboard-write"></iframe>

<script>
  var GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwxr2WZ9nHuXTELzNRDTPYQ57iST_Ts5ZO0AEFYNLP3RrCZsmOOMu9FrrLGAHjqu6y/exec";
  var TIMEOUT_MS = 10000; // kalau belum kelar dalam 10 detik, otomatis reload

  var frame = document.getElementById('app-frame');
  var loader = document.getElementById('loader');
  var loaderText = document.getElementById('loaderText');

  frame.src = GAS_WEB_APP_URL;

  var loaded = false;
  frame.addEventListener('load', function () {
    loaded = true;
    loader.classList.add('hide');
    setTimeout(function () { loader.style.display = 'none'; }, 350);
  });

  // Kalau gagal terhubung dalam batas waktu, coba lagi otomatis (reload halaman)
  setTimeout(function () {
    if (!loaded) {
      loaderText.textContent = 'Menghubungkan ulang...';
      setTimeout(function () { window.location.reload(); }, 600);
    }
  }, TIMEOUT_MS);
</script>

</body>
</html>
